<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Colour & Pattern Demo — Oscar Castellino</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    #sidebar {
      width: 240px;
      min-width: 240px;
      background: #0f0f0f;
      border-right: 1px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid #1e1e1e;
    }
    #sidebar-header h2 {
      color: #d4a853;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    #sidebar-header p { color: #444; font-size: 10px; }
    #palette-list { flex: 1; overflow-y: auto; padding: 8px; }
    #palette-list::-webkit-scrollbar { width: 3px; }
    #palette-list::-webkit-scrollbar-track { background: #0f0f0f; }
    #palette-list::-webkit-scrollbar-thumb { background: #2a2a2a; }

    .pal-btn {
      width: 100%;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 5px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .pal-btn:hover { border-color: #3a3a3a; }
    .pal-btn.active { border-color: #d4a853; box-shadow: 0 0 0 1px #d4a853; }

    .pal-swatch {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .pal-swatch-accent {
      position: absolute;
      bottom: 0; right: 0;
      width: 14px; height: 14px;
      border-top-left-radius: 3px;
    }
    .pal-info { flex: 1; min-width: 0; }
    .pal-num { font-size: 9px; color: #333; letter-spacing: 1.5px; }
    .pal-name { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pal-btn.active .pal-name { color: #d4a853; }
    .pal-pattern { font-size: 9px; color: #444; margin-top: 1px; }
    .pal-dot { width: 5px; height: 5px; border-radius: 50%; background: #d4a853; flex-shrink: 0; opacity: 0; }
    .pal-btn.active .pal-dot { opacity: 1; }

    #preview-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    #preview-bar {
      height: 36px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      flex-shrink: 0;
    }
    .mac-dots { display: flex; gap: 5px; }
    .mac-dot { width: 10px; height: 10px; border-radius: 50%; }
    .mac-dot.r { background: #ff5f57; }
    .mac-dot.y { background: #febc2e; }
    .mac-dot.g { background: #28c840; }
    #preview-label { color: #3a3a3a; font-size: 10px; letter-spacing: 1.5px; flex: 1; text-align: center; text-transform: uppercase; }
    #site-frame { flex: 1; width: 100%; border: none; }
    #loading { position: absolute; inset: 36px 0 0 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; color: #333; font-size: 11px; letter-spacing: 3px; pointer-events: none; transition: opacity 0.4s; }
    #loading.gone { opacity: 0; }
  </style>
</head>

<div id="sidebar">

    </div>
    <div id="preview-label">loading…</div>

  <iframe id="site-frame" src="index.html"></iframe>

const frame = document.getElementById('site-frame');
const label = document.getElementById('preview-label');
const loading = document.getElementById('loading');
const STYLE_ID = 'colour-override';
let currentId = null;

function buildCSS(p) {
  const varStr = Object.entries(p.vars)
    .map(([k, v]) => `${k}: ${v};`)
    .join('\n    ');
  return `
    :root {
      ${varStr}
    }
    body {
      ${p.bodyBg}
    }
    .hero, section, .nav, nav {
      background-color: transparent !important;
    }
  `;
}

function apply(p) {
  const doc = frame.contentDocument || frame.contentWindow.document;
  let el = doc.getElementById(STYLE_ID);
  if (!el) {
    el = doc.createElement('style');
    el.id = STYLE_ID;
    doc.head.appendChild(el);
  }
  el.textContent = buildCSS(p);

  document.querySelectorAll('.pal-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-id="${p.id}"]`);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }

  label.textContent = `${p.name} · ${p.pattern}`;
  currentId = p.id;
}

function renderSidebar() {
  const list = document.getElementById('palette-list');
  list.innerHTML = '';
  PALETTES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pal-btn';
    btn.dataset.id = p.id;
    btn.style.background = p.bg;
    btn.innerHTML = `
      <div class="pal-swatch" style="background:${p.bg}">
        <div class="pal-swatch-accent" style="background:${p.accent}"></div>
      </div>
      <div class="pal-info">
        <div class="pal-num">${String(p.id).padStart(2,'0')}</div>
        <div class="pal-name" style="color:${p.accent}">${p.name}</div>
        <div class="pal-pattern">${p.pattern}</div>
      </div>
      <div class="pal-dot"></div>
    `;
    btn.onclick = () => apply(p);
    list.appendChild(btn);
  });
}

frame.addEventListener('load', () => {
  loading.classList.add('gone');
  const pal = currentId ? PALETTES.find(p => p.id === currentId) : PALETTES[0];
  apply(pal);
});

renderSidebar();
</script>
